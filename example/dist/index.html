<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>web-update-notice-plugin 演示</title>
  <script type="module" crossorigin src="/assets/index-BotGDxWU.js"></script>
</head>
<body style="font-family: sans-serif; padding: 40px; color: #333;">
  <h1>Web 更新提示插件演示</h1>
  <p>该页面每 <strong>2 秒</strong>检查一次更新，以便快速看到效果。</p>
  
  <div style="background: #f0f2f5; padding: 20px; border-radius: 8px; margin-top: 20px;">
    <h3>如何测试：</h3>
    <ol style="line-height: 1.8;">
      <li>保持当前预览页面打开（不要关闭浏览器标签页）。</li>
      <li>在编辑器中打开 <code>example/dist/version.json</code> 文件。</li>
      <li>随意修改里面 <code>"version"</code> 的值（例如改为 <code>"999"</code>），然后保存文件。</li>
      <li>等待几秒钟，当前页面就会弹出更新提示！</li>
      <li>你可以点击“稍后更新”来暂停自动刷新，或者点击“立即刷新”马上加载新版本。</li>
    </ol>
  </div>
  
  <script>
    (function() {
      try {
        const initialVersion = "1774344295677";
        const checkInterval = 2000;
        let hasShownUpdate = false;
        const baseUrl = "/";

        function showNotification() {
          if (document.getElementById('update-notification')) return;
          
          const div = document.createElement('div');
          div.id = 'update-notification';
          div.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background-color: #fff; box-shadow: 0 12px 48px rgba(0,0,0,0.15); border-radius: 16px; padding: 32px; z-index: 99999; display: flex; flex-direction: column; align-items: center; gap: 20px; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-width: 340px; text-align: center;';
          
          div.innerHTML = `
              <div style="width: 64px; height: 64px; background: #ecf5ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px;">
                  🚀
              </div>
              <div style="display: flex; flex-direction: column; gap: 8px;">
                  <div style="font-size: 20px; font-weight: 600; color: #303133;">发现新版本</div>
                  <div style="font-size: 14px; color: #606266;">系统已更新，将在 <span id="update-countdown">5</span> 秒后自动刷新</div>
              </div>
              <div style="width: 100%; height: 4px; background: #f2f3f5; border-radius: 2px; overflow: hidden; margin-top: 8px;">
                  <div id="update-progress-bar" style="height: 100%; background: #409eff; animation: progress 5s linear forwards;"></div>
              </div>
              <div style="display: flex; gap: 12px; margin-top: 12px; width: 100%;">
                  <button id="update-cancel-btn" style="flex: 1; padding: 8px 16px; border: 1px solid #dcdfe6; background: #fff; color: #606266; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.2s;">稍后更新</button>
                  <button id="update-confirm-btn" style="flex: 1; padding: 8px 16px; border: none; background: #409eff; color: #fff; border-radius: 4px; cursor: pointer; font-size: 14px; transition: all 0.2s;">立即刷新</button>
              </div>
              <style>
                  @keyframes progress { from { width: 0%; } to { width: 100%; } }
                  #update-cancel-btn:hover { background: #f5f7fa; color: #409eff; border-color: #c6e2ff; }
                  #update-confirm-btn:hover { background: #66b1ff; }
              </style>
          `;
          
          document.body.appendChild(div);
          
          let countdown = 5;
          const countdownEl = document.getElementById('update-countdown');
          const cancelBtn = document.getElementById('update-cancel-btn');
          const confirmBtn = document.getElementById('update-confirm-btn');
          const progressBar = document.getElementById('update-progress-bar');
          
          let timer = setInterval(() => {
              countdown--;
              if (countdownEl) countdownEl.innerText = countdown.toString();
              if (countdown <= 0) {
                  clearInterval(timer);
                  window.location.reload();
              }
          }, 1000);
          
          if (cancelBtn) {
              cancelBtn.onclick = () => {
                  clearInterval(timer);
                  if (progressBar) progressBar.style.animationPlayState = 'paused';
                  document.body.removeChild(div);
              };
          }
          
          if (confirmBtn) {
              confirmBtn.onclick = () => {
                  clearInterval(timer);
                  window.location.reload();
              };
          }
        }

        function checkUpdate() {
          if (document.hidden) return;
          
          const versionUrl = baseUrl + 'version.json?t=' + Date.now();
          
          fetch(versionUrl)
            .then(res => {
              if (!res.ok) throw new Error('Network response was not ok');
              return res.json();
            })
            .then(data => {
              if (data.version && data.version !== initialVersion && !hasShownUpdate) {
                hasShownUpdate = true;
                showNotification();
              }
            })
            .catch(err => {
              console.warn('Failed to check version:', err);
            });
        }
        
        // Periodic check
        setInterval(checkUpdate, checkInterval);
        
        // Visibility check
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible') {
                checkUpdate();
            }
        });
      } catch (e) {
        console.error('Update check script error:', e);
      }
    })();
  </script>
</body>
</html>
